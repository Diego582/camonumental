<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Club Atlético Monumental Argentino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1e3a5f",
              accent: "#ef4444",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-black text-white min-h-screen flex flex-col overflow-hidden">
    <!-- BACKGROUND STYLE FUTBOLERO -->
    <div class="absolute inset-0 pointer-events-none">
      <!-- diagonal stripes inspired by jersey -->
      <div
        class="absolute inset-0 opacity-10 bg-[repeating-linear-gradient(135deg,#ef4444_0px,#ef4444_40px,transparent_40px,transparent_80px)]"
      ></div>
      <!-- dark gradient overlay -->
      <div
        class="absolute inset-0 bg-gradient-to-br from-primary via-[#0f1f33] to-black"
      ></div>
      <!-- vignette -->
      <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <!-- HERO -->
    <section
      class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-6"
    >
      <img
        src="./image/LOGOCAMA.png"
        alt="Logo Club"
        onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"
        class="w-36 md:w-52 mb-6 drop-shadow-[0_0_25px_rgba(0,0,0,0.8)]"
      />

      <!-- fallback if logo not found -->
      <div
        id="logo-fallback"
        style="display: none"
        class="w-36 md:w-52 h-36 md:h-52 mb-6 rounded-full border-2 border-white/30 items-center justify-center text-xs text-gray-400"
      >
        Logo
      </div>

      <h1 class="text-3xl md:text-5xl font-bold mb-3 tracking-tight">
        Club Atlético Monumental Argentino
      </h1>

      <p class="text-lg md:text-xl text-gray-300 max-w-xl mb-6 italic">
        La pasión que nos une, la historia que nos representa.
      </p>

      <p class="text-sm md:text-base text-gray-400 max-w-md mb-6">
        Muy pronto vas a vivir una nueva forma de conectar con el club, seguir
        cada paso y ser parte de lo que viene.
      </p>

      <div class="flex items-center gap-2 text-sm text-gray-300">
        <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
        Próximamente
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="relative z-10 text-center text-xs py-6 text-gray-400">
      © 2026 Club Atlético Monumental Argentino
    </footer>

    <!-- WHATSAPP PRO -->
    <a
      href="https://wa.me/5492920268135?text=Hola%20quiero%20consultar%20por%20las%20instalaciones%20del%20Club"
      target="_blank"
      rel="noopener noreferrer"
      class="fixed bottom-5 right-5 group z-20"
    >
      <div class="relative flex items-center justify-center">
        <!-- efecto pulso -->
        <span
          class="absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-20 animate-ping"
        ></span>

        <!-- botón -->
        <div
          class="relative flex items-center justify-center w-14 h-14 bg-green-500 rounded-full shadow-lg hover:scale-110 transition-transform duration-300"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="white"
            class="w-7 h-7"
          >
            <path
              d="M16 .396C7.164.396 0 7.56 0 16.396c0 2.89.757 5.705 2.197 8.188L0 32l7.643-2.152A15.89 15.89 0 0016 32c8.836 0 16-7.164 16-16.396C32 7.56 24.836.396 16 .396zm0 29.07a13.01 13.01 0 01-6.633-1.83l-.474-.282-4.536 1.277 1.21-4.417-.308-.454A13.012 13.012 0 012.99 16.396C2.99 9.18 8.784 3.386 16 3.386c7.216 0 13.01 5.794 13.01 13.01 0 7.216-5.794 13.07-13.01 13.07zm7.41-9.77c-.405-.203-2.397-1.183-2.768-1.317-.37-.135-.64-.203-.91.203-.27.405-1.045 1.317-1.283 1.59-.236.27-.473.304-.878.101-.405-.203-1.71-.63-3.258-2.01-1.203-1.074-2.014-2.398-2.25-2.803-.236-.405-.025-.624.178-.827.183-.183.405-.473.608-.71.203-.236.27-.405.405-.675.135-.27.068-.507-.034-.71-.101-.203-.91-2.196-1.247-3.01-.328-.788-.662-.68-.91-.692l-.776-.014c-.27 0-.71.101-1.08.507-.37.405-1.417 1.384-1.417 3.37 0 1.987 1.452 3.907 1.654 4.176.203.27 2.855 4.36 6.92 6.114.967.417 1.72.666 2.307.853.97.308 1.854.265 2.553.161.778-.116 2.397-.98 2.736-1.93.338-.95.338-1.764.236-1.93-.101-.169-.37-.27-.776-.473z"
            />
          </svg>
        </div>

        <span
          class="absolute right-16 bg-black text-white text-xs px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap"
        >
          Escribinos por WhatsApp
        </span>
      </div>
    </a>
  </body>
</html>
